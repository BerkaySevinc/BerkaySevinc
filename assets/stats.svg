<svg xmlns="http://www.w3.org/2000/svg" width="800" height="148" viewBox="0 0 800 148">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #161b22; stroke: #30363d; }
      .ttl { fill: #e6edf3; }
      .val { fill: #a78bfa; }
      .lbl { fill: #8b949e; }
      .div { stroke: #30363d; }
    }
    @media (prefers-color-scheme: light) {
      .bg  { fill: #f6f8fa; stroke: #d0d7de; }
      .ttl { fill: #1f2328; }
      .val { fill: #a78bfa; }
      .lbl { fill: #636e7b; }
      .div { stroke: #d0d7de; }
    }
    .bg  { stroke-width: 1; }
    .ttl { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size: 14px; font-weight: 600; }
    .val { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size: 28px; font-weight: 700; }
    .lbl { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; font-size: 11px; font-weight: 500; }
    .div { stroke-width: 1; }
  </style>

  <rect class="bg" x="0.5" y="0.5" width="799" height="147" rx="10"/>
  <text class="ttl" x="400" y="28" text-anchor="middle">GitHub Stats</text>
  <line class="div" x1="18" y1="40" x2="782" y2="40"/>

  <text x="133.3" y="93"  text-anchor="middle" class="val">203</text>
  <text x="133.3" y="118" text-anchor="middle" class="lbl">Commits</text>
  <line x1="267" y1="48" x2="267" y2="136" class="div"/>
  <text x="400.0" y="93"  text-anchor="middle" class="val">18</text>
  <text x="400.0" y="118" text-anchor="middle" class="lbl">Stars</text>
  <line x1="533" y1="48" x2="533" y2="136" class="div"/>
  <text x="666.7" y="93"  text-anchor="middle" class="val">18</text>
  <text x="666.7" y="118" text-anchor="middle" class="lbl">Repos</text>

</svg>
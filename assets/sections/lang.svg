<svg xmlns="http://www.w3.org/2000/svg" width="443" height="80" viewBox="0 0 443 80">
  <style>
    @media (prefers-color-scheme: light) { .label { fill: #1e1b4b; } }
    @media (prefers-color-scheme: dark)  { .label { fill: #ffffff; } }
  </style>

  <!-- Label -->
  <text class="label" x="221.5" y="26" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600">Languages</text>

  <!-- Badges -->
  <!-- C# -->
  <rect x="0"     y="52" width="96" height="28" rx="4" fill="#1d7a1a"/>

  <rect x="3" y="52" width="4"    height="28"        fill="#145312"/>
  <text x="52" y="70" text-anchor="middle" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="0.8">C#</text>

  <!-- JAVASCRIPT -->
  <rect x="104"     y="52" width="131" height="28" rx="4" fill="#e0c910"/>
  <rect x="104"     y="52" width="7"    height="28" rx="4" fill="#98890b"/>

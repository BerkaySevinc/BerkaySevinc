<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
  .t {
    font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
    font-size: 22px;
    font-weight: 700;
    fill: #A78BFA;
  }

  /* Clip rect animations */
  .cr1 { animation: cl1 20s infinite; }
  .cr2 { animation: cl2 20s infinite; }
  .cr3 { animation: cl3 20s infinite; }
  .cr4 { animation: cl4 20s infinite; }
  .cr5 { animation: cl5 20s infinite; }

  /* Line 1: .NET &amp; C# Developer — 19 chars — 250.8px */
  @keyframes cl1 {
    0%         { width: 0;       animation-timing-function: steps(19, end); }
    7%         { width: 250.8px; animation-timing-function: step-end; }
    13%        { width: 250.8px; animation-timing-function: steps(19, end); }
    17%, 100%  { width: 0; }
  }

  /* Line 2: ASP.NET Core · Node.js — 22 chars — 290.4px */
  @keyframes cl2 {
    0%, 19.9%  { width: 0; }
    20%        { width: 0;       animation-timing-function: steps(22, end); }
    27%        { width: 290.4px; animation-timing-function: step-end; }
    33%        { width: 290.4px; animation-timing-function: steps(22, end); }
    37%, 100%  { width: 0; }
  }

  /* Line 3: HTML · CSS · JavaScript — 23 chars — 303.6px */
  @keyframes cl3 {
    0%, 39.9%  { width: 0; }
    40%        { width: 0;       animation-timing-function: steps(23, end); }
    47%        { width: 303.6px; animation-timing-function: step-end; }
    53%        { width: 303.6px; animation-timing-function: steps(23, end); }
    57%, 100%  { width: 0; }
  }

  /* Line 4: AI-Assisted Engineering — 23 chars — 303.6px */
  @keyframes cl4 {
    0%, 59.9%  { width: 0; }
    60%        { width: 0;       animation-timing-function: steps(23, end); }
    67%        { width: 303.6px; animation-timing-function: step-end; }
    73%        { width: 303.6px; animation-timing-function: steps(23, end); }
    77%, 100%  { width: 0; }
  }

  /* Line 5: Spec-Driven Development — 23 chars — 303.6px */
  @keyframes cl5 {
    0%, 79.9%  { width: 0; }
    80%        { width: 0;       animation-timing-function: steps(23, end); }
    87%        { width: 303.6px; animation-timing-function: step-end; }
    93%        { width: 303.6px; animation-timing-function: steps(23, end); }
    97%, 100%  { width: 0; }
  }

  /* Cursor wrappers — control position and visibility */
  .cw1 { animation: cw1 20s infinite; }
  .cw2 { animation: cw2 20s infinite; }
  .cw3 { animation: cw3 20s infinite; }
  .cw4 { animation: cw4 20s infinite; }
  .cw5 { animation: cw5 20s infinite; }

  @keyframes cw1 {
    0%        { transform: translateX(0px);     visibility: visible; animation-timing-function: steps(19, end); }
    7%        { transform: translateX(250.8px); visibility: visible; animation-timing-function: step-end; }
    13%       { transform: translateX(250.8px); visibility: visible; animation-timing-function: steps(19, end); }
    17%       { transform: translateX(0px);     visibility: visible; }
    17.01%    { visibility: hidden; transform: translateX(0px); }
    100%      { visibility: hidden; transform: translateX(0px); }
  }
  @keyframes cw2 {
    0%, 19.9% { visibility: hidden; transform: translateX(0px); }
    20%       { transform: translateX(0px);     visibility: visible; animation-timing-function: steps(22, end); }
    27%       { transform: translateX(290.4px); visibility: visible; animation-timing-function: step-end; }
    33%       { transform: translateX(290.4px); visibility: visible; animation-timing-function: steps(22, end); }
    37%       { transform: translateX(0px);     visibility: visible; }
    37.01%    { visibility: hidden; transform: translateX(0px); }
    100%      { visibility: hidden; transform: translateX(0px); }
  }
  @keyframes cw3 {
    0%, 39.9% { visibility: hidden; transform: translateX(0px); }
    40%       { transform: translateX(0px);     visibility: visible; animation-timing-function: steps(23, end); }
    47%       { transform: translateX(303.6px); visibility: visible; animation-timing-function: step-end; }
    53%       { transform: translateX(303.6px); visibility: visible; animation-timing-function: steps(23, end); }
    57%       { transform: translateX(0px);     visibility: visible; }
    57.01%    { visibility: hidden; transform: translateX(0px); }
    100%      { visibility: hidden; transform: translateX(0px); }
  }
  @keyframes cw4 {
    0%, 59.9% { visibility: hidden; transform: translateX(0px); }
    60%       { transform: translateX(0px);     visibility: visible; animation-timing-function: steps(23, end); }
    67%       { transform: translateX(303.6px); visibility: visible; animation-timing-function: step-end; }
    73%       { transform: translateX(303.6px); visibility: visible; animation-timing-function: steps(23, end); }
    77%       { transform: translateX(0px);     visibility: visible; }
    77.01%    { visibility: hidden; transform: translateX(0px); }
    100%      { visibility: hidden; transform: translateX(0px); }
  }
  @keyframes cw5 {
    0%, 79.9% { visibility: hidden; transform: translateX(0px); }
    80%       { transform: translateX(0px);     visibility: visible; animation-timing-function: steps(23, end); }
    87%       { transform: translateX(303.6px); visibility: visible; animation-timing-function: step-end; }
    93%       { transform: translateX(303.6px); visibility: visible; animation-timing-function: steps(23, end); }
    97%       { transform: translateX(0px);     visibility: visible; }
    97.01%    { visibility: hidden; transform: translateX(0px); }
    100%      { visibility: hidden; transform: translateX(0px); }
  }

  /* Cursor blink */
  .cur { fill: #A78BFA; animation: blink 0.8s step-end infinite; }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0; }
  }
</style>

<defs>
  <clipPath id="cp1"><rect class="cr1" x="274.6" y="0" width="0" height="100"/></clipPath>
  <clipPath id="cp2"><rect class="cr2" x="254.8" y="0" width="0" height="100"/></clipPath>
  <clipPath id="cp3"><rect class="cr3" x="248.2" y="0" width="0" height="100"/></clipPath>
  <clipPath id="cp4"><rect class="cr4" x="248.2" y="0" width="0" height="100"/></clipPath>
  <clipPath id="cp5"><rect class="cr5" x="248.2" y="0" width="0" height="100"/></clipPath>
</defs>

<!-- Text lines -->
<text class="t" clip-path="url(#cp1)" x="274.6" y="62" textLength="250.8" lengthAdjust="spacingAndGlyphs">.NET &amp; C# Developer</text>
<text class="t" clip-path="url(#cp2)" x="254.8" y="62" textLength="290.4" lengthAdjust="spacingAndGlyphs">ASP.NET Core · Node.js</text>
<text class="t" clip-path="url(#cp3)" x="248.2" y="62" textLength="303.6" lengthAdjust="spacingAndGlyphs">HTML · CSS · JavaScript</text>
<text class="t" clip-path="url(#cp4)" x="248.2" y="62" textLength="303.6" lengthAdjust="spacingAndGlyphs">AI-Assisted Engineering</text>
<text class="t" clip-path="url(#cp5)" x="248.2" y="62" textLength="303.6" lengthAdjust="spacingAndGlyphs">Spec-Driven Development</text>

<!-- Cursors -->
<g class="cw1"><rect class="cur" x="274.6" y="44" width="2.5" height="22"/></g>
<g class="cw2"><rect class="cur" x="254.8" y="44" width="2.5" height="22"/></g>
<g class="cw3"><rect class="cur" x="248.2" y="44" width="2.5" height="22"/></g>
<g class="cw4"><rect class="cur" x="248.2" y="44" width="2.5" height="22"/></g>
<g class="cw5"><rect class="cur" x="248.2" y="44" width="2.5" height="22"/></g>

</svg>
